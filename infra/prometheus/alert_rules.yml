groups:
  - name: alert_intelligence_platform
    rules:
      # Backend API Health
      - alert: BackendDown
        expr: up{job="alert-intelligence-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend API is down"
          description: "Backend API has been down for more than 1 minute."

      - alert: BackendHighErrorRate
        expr: rate(http_requests_total{status=~"5..", job="alert-intelligence-backend"}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Backend API high error rate"
          description: "Backend API error rate is {{ $value }} errors per second."

      - alert: BackendHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="alert-intelligence-backend"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backend API high latency"
          description: "Backend API 95th percentile latency is {{ $value }} seconds."

      # Frontend Health
      - alert: FrontendDown
        expr: up{job="alert-intelligence-frontend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Frontend is down"
          description: "Frontend has been down for more than 1 minute."

      # Database Health
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL has been down for more than 1 minute."

      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL high connection count"
          description: "PostgreSQL has {{ $value }} active connections."

      - alert: PostgresSlowQueries
        expr: rate(pg_stat_statements_calls_total{mean_exec_time > 1}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL slow queries detected"
          description: "PostgreSQL slow query rate is {{ $value }} queries per second."

      # Elasticsearch Health
      - alert: ElasticsearchDown
        expr: up{job="elasticsearch"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Elasticsearch is down"
          description: "Elasticsearch has been down for more than 1 minute."

      - alert: ElasticsearchClusterRed
        expr: elasticsearch_cluster_health_status{color="red"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Elasticsearch cluster status is red"
          description: "Elasticsearch cluster status is red."

      - alert: ElasticsearchClusterYellow
        expr: elasticsearch_cluster_health_status{color="yellow"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elasticsearch cluster status is yellow"
          description: "Elasticsearch cluster status is yellow."

      - alert: ElasticsearchHighDiskUsage
        expr: elasticsearch_filesystem_data_available_bytes / elasticsearch_filesystem_data_total_bytes < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elasticsearch high disk usage"
          description: "Elasticsearch disk usage is above 90%."

      # Redis Health
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been down for more than 1 minute."

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis high memory usage"
          description: "Redis memory usage is above 90%."

      # Kafka Health
      - alert: KafkaDown
        expr: up{job="kafka"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kafka is down"
          description: "Kafka has been down for more than 1 minute."

      - alert: KafkaHighDiskUsage
        expr: kafka_log_LogSize_bytes / kafka_log_LogTotalBytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka high disk usage"
          description: "Kafka disk usage is above 90%."

      # System Resources
      - alert: HighCPUUsage
        expr: 100 - (avg by instance (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for instance {{ $labels.instance }}."

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 85% for instance {{ $labels.instance }}."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 10% for instance {{ $labels.instance }}."

      # Application Metrics
      - alert: HighAlertVolume
        expr: rate(alerts_ingested_total[5m]) > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High alert volume"
          description: "Alert ingestion rate is {{ $value }} alerts per second."

      - alert: IncidentBacklog
        expr: active_incidents_total > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of active incidents"
          description: "There are {{ $value }} active incidents."

      - alert: ProcessingLatencyHigh
        expr: histogram_quantile(0.95, rate(alert_processing_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High alert processing latency"
          description: "95th percentile alert processing latency is {{ $value }} seconds."

  - name: kubernetes_health
    rules:
      - alert: KubernetesPodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod is crash looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping."

      - alert: KubernetesPodNotReady
        expr: kube_pod_status_ready{condition="true"} == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pod is not ready"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready."

      - alert: KubernetesNodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Node is not ready"
          description: "Node {{ $labels.node }} is not ready."
