apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-intelligence-config
  namespace: alert-intelligence
data:
  DATABASE_URL: "postgresql+asyncpg://postgres:password@postgres:5432/alert_intelligence"
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
  REDIS_URL: "redis://redis:6379/0"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  DEBUG: "false"
  HOST: "0.0.0.0"
  PORT: "8000"
  ALERT_DEDUP_WINDOW_MINUTES: "5"
  CLUSTERING_SIMILARITY_THRESHOLD: "0.8"
  MAX_ALERTS_PER_CLUSTER: "100"
  PROMETHEUS_PORT: "9090"
  REDIS_CACHE_TTL: "3600"
  KAFKA_TOPIC_ALERTS: "alerts"
  KAFKA_TOPIC_INCIDENTS: "incidents"
  ELASTICSEARCH_INDEX_PREFIX: "alerts"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: alert-intelligence
data:
  REACT_APP_API_URL: "http://api-service:8000"
