apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: alert-intelligence
  labels:
    app: backend
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        version: v1
    spec:
      containers:
      - name: backend
        image: alert-intelligence/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: alert-intelligence-config
              key: DATABASE_URL
        - name: ELASTICSEARCH_URL
          valueFrom:
            configMapKeyRef:
              name: alert-intelligence-config
              key: ELASTICSEARCH_URL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: alert-intelligence-config
              key: REDIS_URL
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: alert-intelligence-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: alert-intelligence-secrets
              key: SECRET_KEY
        - name: DEBUG
          valueFrom:
            configMapKeyRef:
              name: alert-intelligence-config
              key: DEBUG
        - name: HOST
          valueFrom:
            configMapKeyRef:
              name: alert-intelligence-config
              key: HOST
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: alert-intelligence-config
              key: PORT
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: alert-intelligence
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: backend
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: alert-intelligence
  labels:
    app: backend
spec:
  type: LoadBalancer
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: backend
